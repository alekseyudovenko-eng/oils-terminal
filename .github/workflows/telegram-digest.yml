name: 📰 Telegram News Digest

on:
  schedule:
    - cron: '40 11 * * *'  # ← 11:40 UTC = 14:40 Израиль
  workflow_dispatch:

jobs:
  trigger:
    runs-on: ubuntu-latest
    steps:
      - name: Call Vercel Cron
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://${{ secrets.VERCEL_URL }}/api/cron/telegram-digest?key=${{ secrets.CRON_SECRET }}")
          echo "HTTP Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "❌ Failed"
            exit 1
          fi
          echo "✅ Sent to Telegram"
